<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AnonChat · Anonymous Chat & Stories</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Auth Screens -->
  <div id="authContainer" class="auth-container">
    <div class="auth-card">
      <h1><i class="fab fa-instagram"></i> AnonChat</h1>
      <div class="auth-tabs">
        <button id="showLoginBtn" class="active">Login</button>
        <button id="showSignupBtn">Sign Up</button>
      </div>
      <div id="loginForm" class="auth-form">
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="doLogin">Enter Chat</button>
      </div>
      <div id="signupForm" class="auth-form" style="display:none;">
        <input type="text" id="signupUsername" placeholder="Username (optional)">
        <input type="password" id="signupPassword" placeholder="Password">
        <textarea id="signupBio" placeholder="Bio (optional)"></textarea>
        <button id="doSignup">Create Account</button>
      </div>
      <p class="auth-note">💡 Leave username blank → random like <strong>Anonim_48291</strong></p>
    </div>
  </div>

  <!-- Main App (hidden until login) -->
  <div id="chatApp" style="display:none;">
    <div class="app-container">
      <!-- Sidebar with Tabs -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h2><i class="fab fa-instagram"></i> AnonChat</h2>
        </div>
        
        <!-- Tab buttons -->
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="chats">
            <i class="fas fa-comment-dots"></i> Chats
          </button>
          <button class="tab-btn" data-tab="users">
            <i class="fas fa-users"></i> Users
          </button>
        </div>

        <!-- Chats list (DMs & Groups) -->
        <div class="chats-list" id="chatsList">
          <!-- Populated by JavaScript -->
        </div>

        <!-- Users list (for follow/unfollow) -->
        <div class="users-list" id="usersList" style="display:none;">
          <!-- Populated by JavaScript -->
        </div>

        <!-- Online count badge (mobile-friendly) -->
        <div class="online-badge" id="onlineBadge">
          <i class="fas fa-circle" style="color:#26de81;font-size:10px;"></i>
          <span id="userCount">0</span> online
        </div>
      </div>

      <!-- Main Chat Area -->
      <div class="main-area">
        <!-- Chat Header -->
        <div class="chat-header">
          <div class="user-profile">
            <span id="currentUsername"></span>
            <span id="currentBio" class="bio-text"></span>
          </div>
          <!-- DM header info -->
          <div id="chatHeaderInfo" style="display:flex;align-items:center;gap:8px;">
            <img id="chatAvatar" class="chat-avatar" style="width:36px;height:36px;border-radius:50%;display:none;">
            <div>
              <strong id="chatName">Select a chat</strong><br>
              <span id="chatStatus" style="font-size:12px;">start messaging</span>
            </div>
          </div>
          <div id="hamburgerBtn" class="menu-icon">
            <i class="fas fa-bars"></i>
          </div>
        </div>
        
        <!-- Stories Row -->
        <div class="stories-section">
          <div class="stories-title">📸 Stories (24h)</div>
          <div class="stories-row" id="storiesRow">
            <div class="story-add" id="addStoryBtn">
              <i class="fas fa-plus-circle"></i><span>Your Story</span>
            </div>
          </div>
        </div>

        <!-- Chat Messages -->
        <div class="messages-area" id="messagesArea">
          <div class="empty-chat-message">
            <i class="fas fa-comment-dots"></i>
            <p>Select a chat to start messaging</p>
          </div>
        </div>

        <!-- ====== UPDATED CHAT INPUT (with recipient field) ====== -->
        <div class="chat-input">
          <!-- Recipient input (with datalist for auto-completion) -->
          <input type="text" id="recipientInput" list="onlineUsersList" placeholder="To (username)" style="width:120px;flex-shrink:0;">
          <datalist id="onlineUsersList"></datalist>
          
          <input type="text" id="messageInput" placeholder="Type a message..." disabled>
          <button id="sendBtn" disabled><i class="fas fa-paper-plane"></i> Send</button>
        </div>
        <!-- ===================================================== -->
      </div>

      <!-- Reels Section (Right Column) -->
      <div class="reels-sidebar">
        <div class="reels-header">🎬 Reels</div>
        <div class="reels-grid" id="reelsGrid">
          <div class="reel-add" id="addReelBtn">
            <i class="fas fa-video"></i> Upload Reel
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile Edit Modal -->
  <div id="profileModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Edit Profile</h2>
      <label>Nickname</label>
      <input type="text" id="editUsername">
      <label>Bio</label>
      <textarea id="editBio"></textarea>
      <button id="saveProfileBtn">Save Changes</button>
    </div>
  </div>

  <!-- Story/Reel Upload Modal -->
  <div id="uploadModal" class="modal">
    <div class="modal-content">
      <span class="close-modal close-upload">&times;</span>
      <h2 id="uploadTitle">Add Story</h2>
      <input type="file" id="uploadFile" accept="image/*,video/*">
      <textarea id="uploadText" placeholder="Add text caption..."></textarea>
      <button id="confirmUploadBtn">Publish</button>
    </div>
  </div>

  <!-- Immersive Story/Reel Viewer Modal -->
  <div id="storyViewerModal" class="modal story-viewer-modal">
    <div class="modal-content">
      <button id="closeStoryViewer" class="close-story-btn">
        <i class="fas fa-times"></i>
      </button>
      <div class="story-viewer-container">
        <div id="storyViewerMedia"></div>
        <div id="storyViewerCaption"></div>
        <div id="storyViewerUser" class="story-viewer-user"></div>
        <div class="story-viewer-actions">
          <button id="viewerLikeBtn" class="viewer-like-btn">
            <i class="fas fa-heart"></i> <span id="viewerLikeCount">0</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Bottom Navigation -->
  <div class="mobile-nav" id="mobileNav">
    <button class="active" data-view="chat"><i class="fas fa-comment"></i> Chat</button>
    <button data-view="reels"><i class="fas fa-film"></i> Reels</button>
    <button data-view="stories"><i class="fas fa-camera"></i> Stories</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
