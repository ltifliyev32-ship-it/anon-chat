<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaChat · Yellow & Red Vibe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <h1><i class="fab fa-instagram"></i> InstaChat</h1>
      <input type="text" id="nicknameInput" placeholder="Choose a nickname (optional)">
      <textarea id="bioInput" placeholder="Tell something about yourself... (optional)"></textarea>
      <button id="loginBtn">Join Chat</button>
      <p class="hint">Leave blank → auto nickname like <strong>Anonim_48291</strong></p>
    </div>
  </div>

  <!-- Main Chat Interface (hidden until login) -->
  <div id="chatApp" class="chat-app" style="display: none;">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2><i class="fab fa-instagram"></i> InstaChat</h2>
      </div>
      <div class="online-users">
        <h3>Online <span id="userCount">0</span></h3>
        <ul id="usersList"></ul>
      </div>
    </div>
    <div class="main-chat">
      <div class="chat-header">
        <div class="current-user-info">
          <span id="currentNickname"></span>
          <span id="currentBio" class="bio-text"></span>
        </div>
        <div class="menu-icon" id="hamburgerBtn">
          <i class="fas fa-bars"></i>
        </div>
      </div>
      <div class="messages-area" id="messagesArea">
        <!-- messages appear here -->
      </div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn"><i class="fas fa-paper-plane"></i> Send</button>
      </div>
    </div>
  </div>

  <!-- Profile Edit Modal (Hamburger Menu) -->
  <div id="profileModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Edit Profile</h2>
      <label>Nickname</label>
      <input type="text" id="editNickname" placeholder="Your nickname">
      <label>Bio</label>
      <textarea id="editBio" placeholder="Your bio..."></textarea>
      <button id="saveProfileBtn">Save Changes</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
