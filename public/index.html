<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AnonChat</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Auth Screens -->
  <div id="authContainer" class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-comment-dots"></i>
        <h1>AnonChat</h1>
      </div>
      <div class="auth-tabs">
        <button id="showLoginBtn" class="active">Sign In</button>
        <button id="showSignupBtn">Sign Up</button>
      </div>
      <div id="loginForm" class="auth-form">
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="doLogin">Enter Chat</button>
      </div>
      <div id="signupForm" class="auth-form" style="display:none;">
        <input type="text" id="signupUsername" placeholder="Username (optional)">
        <input type="password" id="signupPassword" placeholder="Password">
        <textarea id="signupBio" placeholder="Bio (optional)"></textarea>
        <button id="doSignup">Create Account</button>
      </div>
      <p class="auth-note">💡 Leave username blank → random like <strong>Anonim_48291</strong></p>
    </div>
  </div>

  <!-- Main App -->
  <div id="chatApp" style="display:none;">
    <div class="app-container">
      <!-- Sidebar - Message List -->
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">
            <i class="fas fa-comment-dots"></i>
            <span>Messages</span>
          </div>
          <div class="sidebar-actions">
            <button id="hamburgerBtn" class="icon-btn">
              <i class="fas fa-ellipsis-v"></i>
            </button>
          </div>
        </div>

        <!-- Online status + search (optional) -->
        <div class="sidebar-status">
          <span class="online-dot"></span>
          <span id="userCountDisplay">0 online</span>
        </div>

        <!-- Chats List -->
        <div class="chats-list" id="chatsList">
          <!-- Populated by JavaScript -->
        </div>

        <!-- Bottom nav (mobile) -->
        <div class="sidebar-bottom">
          <button class="bottom-btn active" data-tab="chats">
            <i class="fas fa-comment"></i>
          </button>
          <button class="bottom-btn" data-tab="users">
            <i class="fas fa-users"></i>
          </button>
          <button class="bottom-btn" data-tab="stories">
            <i class="fas fa-camera"></i>
          </button>
        </div>
      </div>

      <!-- Main Chat Area -->
      <div class="main-area">
        <!-- Chat Header -->
        <div class="chat-header" id="chatHeader">
          <div class="chat-header-left">
            <img id="chatAvatar" class="chat-avatar" src="" alt="avatar">
            <div class="chat-header-info">
              <strong id="chatName">Select a chat</strong>
              <span id="chatStatus">start messaging</span>
            </div>
          </div>
          <div class="chat-header-right">
            <button class="icon-btn" id="chatMenuBtn">
              <i class="fas fa-ellipsis-v"></i>
            </button>
          </div>
        </div>

        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea">
          <div class="empty-state">
            <i class="fas fa-comment-dots"></i>
            <p>Select a conversation</p>
            <span>Start messaging by choosing a chat from the list</span>
          </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input" id="chatInput">
          <button class="attach-btn" id="attachBtn">
            <i class="fas fa-paperclip"></i>
          </button>
          <input type="text" id="messageInput" placeholder="Type a message..." disabled>
          <button id="sendBtn" class="send-btn" disabled>
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile Edit Modal -->
  <div id="profileModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Profile</h2>
      <div class="profile-avatar-edit">
        <img id="profileAvatarPreview" src="" alt="avatar">
        <label for="avatarUpload" class="avatar-upload-btn">
          <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
      </div>
      <label>Nickname</label>
      <input type="text" id="editUsername">
      <label>Bio</label>
      <textarea id="editBio"></textarea>
      <button id="saveProfileBtn">Save Changes</button>
    </div>
  </div>

  <!-- Story/Reel Upload Modal -->
  <div id="uploadModal" class="modal">
    <div class="modal-content">
      <span class="close-modal close-upload">&times;</span>
      <h2 id="uploadTitle">Add Story</h2>
      <input type="file" id="uploadFile" accept="image/*,video/*">
      <textarea id="uploadText" placeholder="Add text caption..."></textarea>
      <button id="confirmUploadBtn">Publish</button>
    </div>
  </div>

  <!-- Story Viewer Modal -->
  <div id="storyViewerModal" class="modal story-viewer-modal">
    <div class="modal-content">
      <button id="closeStoryViewer" class="close-story-btn">
        <i class="fas fa-times"></i>
      </button>
      <div class="story-viewer-container">
        <div id="storyViewerMedia"></div>
        <div id="storyViewerCaption"></div>
        <div id="storyViewerUser" class="story-viewer-user"></div>
        <div class="story-viewer-actions">
          <button id="viewerLikeBtn" class="viewer-like-btn">
            <i class="fas fa-heart"></i> <span id="viewerLikeCount">0</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
