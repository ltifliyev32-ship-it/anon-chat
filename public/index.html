<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AnonChat · Anonymous Dating & Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f0f10; color: #f5f5f7; height: 100vh; overflow: hidden; }
    .app { display: flex; height: 100vh; width: 100%; background: #000; }
    .sidebar { width: 360px; background: #121212; border-right: 1px solid #2c2c2e; display: flex; flex-direction: column; overflow-y: auto; }
    .main-chat { flex: 1; display: flex; flex-direction: column; background: #0c0c0e; }
    .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid #2c2c2e; background: #101011; }
    .chat-input-area { padding: 12px 16px; background: #101011; border-top: 1px solid #2c2c2e; display: flex; gap: 10px; align-items: center; }
    #messageInput { flex: 1; background: #1c1c1e; border: none; padding: 12px; border-radius: 28px; color: white; outline: none; }
    button { background: #ff2a6d; border: none; padding: 10px 16px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; }
    @media (max-width: 720px) { .sidebar { width: 280px; } }
  </style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div style="padding: 20px;">AnonChat Sidebar</div>
  </div>
  <div class="main-chat">
    <div class="chat-header">Mesajlar</div>
    <div id="messagesArea" class="messages-area"></div>
    <div class="chat-input-area">
      <input type="text" id="messageInput" placeholder="Mesaj yazın...">
      <button onclick="sendMessage()">Göndər</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const messagesArea = document.getElementById('messagesArea');
  const messageInput = document.getElementById('messageInput');

  // Qoşulma
  socket.on('connect', () => {
    console.log("Serverə qoşulduq! ID:", socket.id);
    socket.emit('init', {
      userId: 'user_' + Math.floor(Math.random() * 1000000),
      nickname: 'Anonim_' + Math.floor(Math.random() * 100),
      avatar: 'https://i.pravatar.cc/150'
    });
  });

  // Mesaj gələndə
  socket.on('new_message', (msg) => {
    const div = document.createElement('div');
    div.style.padding = "10px";
    div.style.background = "#26262b";
    div.style.borderRadius = "10px";
    div.innerText = `${msg.senderName}: ${msg.content}`;
    messagesArea.appendChild(div);
  });

  // Mesaj göndərmə
  function sendMessage() {
    const content = messageInput.value;
    if (content) {
      socket.emit('send_message', {
        conversationId: 'general',
        messageType: 'text',
        content: content
      });
      messageInput.value = '';
    }
  }
</script>
</body>
</html>
